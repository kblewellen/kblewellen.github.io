<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Tools — Ms. Lewellen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100vh; }
  body { background: #f1f4f8; font-family: 'Libre Franklin', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #15202e; }
  ::selection { background: #b8d8de; }
  a { color: inherit; text-decoration: none; }
  .tool-card { transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; cursor: pointer; }
  .tool-card:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -18px rgba(21,32,46,0.35); border-color: #c0cedc; }
  .tab { transition: color .15s ease; }
  #header-title { cursor: pointer; }
  #header-title:hover { color: #8ab8c4; }
</style>
</head>
<body>

<div style="min-height: 100vh; display: flex; flex-direction: column;">

  <!-- HEADER -->
  <div style="background: #032260; border-bottom: 1px solid #021a52; padding: 18px 36px; display: flex; align-items: center; justify-content: space-between;">
    <span id="header-title" style="font-size: 15px; font-weight: 600; color: #548a96; letter-spacing: -0.01em; transition: color .15s ease;">Student Tools from Ms. Lewellen</span>
    <a href="index.html" style="font-size: 13px; color: #548a96; display: flex; align-items: center; gap: 5px;">← Main site</a>
  </div>

  <!-- TAB BAR -->
  <div id="tabs" style="background: #fff; border-bottom: 1px solid #e4eaf8; padding: 0 36px; display: flex; gap: 4px; overflow-x: auto;"></div>

  <!-- CONTENT -->
  <div style="flex: 1; max-width: 950px; width: 100%; margin: 0 auto; padding: 44px 36px 72px;">

    <!-- class heading (hidden in all-tools view) -->
    <div id="class-heading" style="margin-bottom: 36px;">
      <div id="class-meta" style="font-family: 'Spline Sans Mono', monospace; font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #6f8197; margin-bottom: 10px;"></div>
      <h1 id="class-title" style="font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 10px;"></h1>
      <p id="class-blurb" style="font-size: 16px; line-height: 1.6; color: #4a596b; margin: 0; max-width: 600px;"></p>
    </div>

    <!-- tools -->
    <div style="margin-bottom: 44px;">
      <div id="tools-label" style="font-family: 'Spline Sans Mono', monospace; font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #0c5969; margin-bottom: 16px;">Tools</div>
      <div id="tools-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;"></div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer style="padding: 22px 36px; border-top: 1px solid #e4eaf8; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; background: #fff;">
    <p style="font-size: 13px; color: #93a3b5; margin: 0; line-height: 1.6;">Built with <span style="color: #56657a; font-weight: 500;">Claude Design</span> and <span style="color: #56657a; font-weight: 500;">Claude Code</span>. Curious? <a href="mailto:klewellen@andover.edu" style="color: #0c5969; font-weight: 500;">Get in touch.</a></p>
    <p style="font-family: 'Spline Sans Mono', monospace; font-size: 11px; color: #b5c1cd; margin: 0; letter-spacing: 0.06em;">KBL</p>
  </footer>

</div>

<script>
const TOOLS = {
  help411: {
    name: '411 Help',
    kind: 'Student tool',
    glyph: '◈',
    desc: 'Pick your skills, name your need, and compose an AI ask that keeps the thinking yours.',
    href: 'student_tools/411_help/411_help_v4.html',
  },
  gateCrashers: {
    name: 'Gate Crashers',
    kind: 'Game',
    glyph: '⊘',
    desc: 'Debug broken logic gate circuits — trace the signal, find what GlitchBot swapped.',
    href: 'edu_games/gate-crashers/index.html',
  },
  vexSim: {
    name: 'VEX Sim',
    kind: 'Simulator',
    glyph: '▷',
    desc: 'Upload your VEXcode Python and watch your robot trace its path on a virtual field.',
    href: 'vex_sim/index.html',
  },
};

const ALL_TOOLS = [TOOLS.vexSim, TOOLS.gateCrashers, TOOLS.help411];

const CLASSES = [
  {
    id: 'csc401',
    code: '401',
    shortTitle: 'Python',
    title: 'Programming in Python',
    meta: 'CSC401 · Introductory · T1, T2',
    blurb: 'An introduction to computational thinking through Python. Students design and code their own projects — programming robots, introductory data analysis, game development, and more.',
    tools: [],
  },
  {
    id: 'csc411',
    code: '411',
    shortTitle: 'Robotics',
    title: 'Robotics',
    meta: 'CSC411 · Introductory · T1, T3',
    blurb: 'A hands-on, project-based course using the engineering process to design and build robots capable of complex behaviors — including ethical and cultural dimensions of AI.',
    tools: [TOOLS.vexSim, TOOLS.help411],
  },
  {
    id: 'csc454',
    code: '454',
    shortTitle: 'Organization',
    title: 'Computer Organization & Hardware',
    meta: 'CSC454 · Intermediate · T3',
    blurb: 'An introduction to the organization and design of computer systems — digital logic, circuit design, memory architectures, and assembly language — culminating in building a simple computer in simulation.',
    tools: [TOOLS.gateCrashers],
  },
  {
    id: 'csc551',
    code: '551',
    shortTitle: 'Algorithms',
    title: 'Data Structures & Algorithms',
    meta: 'CSC551 · Advanced · T3',
    blurb: 'Study, build, test, and apply data structures — stacks, queues, linked lists, trees, graphs, and more — alongside the algorithms and software practices (source control, testing) that make them useful.',
    tools: [],
  },
  {
    id: 'csc571',
    code: '571',
    shortTitle: 'Autonomous',
    title: 'Autonomous Systems',
    meta: 'CSC571 · Advanced · T2',
    blurb: 'A hands-on, project-driven course in the design and control of autonomous systems. Students plan and build in self-selected domains — exploring robotics, AI, and control engineering while examining the ethical and societal implications of their systems.',
    tools: [TOOLS.vexSim, TOOLS.help411],
  },
  {
    id: 'mth',
    code: 'MTH',
    shortTitle: 'Mathematics',
    title: 'Mathematics',
    meta: 'MTH350 / MTH360 / MTH580',
    blurb: 'Precalculus (350/360) and BC Calculus (580), taught with a focus on exploration, reasoning, and connection — drawing from traditions of complex instruction, problem-based learning, and standards-based grading. The goal is always to find a why that makes sense, even before the how solidifies.',
    tools: [],
  },
];

let activeId = null;

function toolCardHTML(t) {
  return `
    <div data-href="${t.href}" class="tool-card" style="
      background: #fff; border: 1px solid #dce8ea; border-radius: 14px;
      padding: 22px 20px; display: block; color: inherit;">
      <div style="
        width: 40px; height: 40px; border-radius: 10px; background: #e8f3f5;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; color: #0c5969; margin-bottom: 14px;">${t.glyph}</div>
      <div style="font-size: 16px; font-weight: 600; margin-bottom: 6px;">${t.name}</div>
      <div style="font-family: 'Spline Sans Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: #548a96; margin-bottom: 10px;">${t.kind}</div>
      <div style="font-size: 13.5px; line-height: 1.5; color: #56657a;">${t.desc}</div>
    </div>
  `;
}

function renderTabs() {
  const bar = document.getElementById('tabs');
  bar.innerHTML = CLASSES.map(c => {
    const on = c.id === activeId;
    return `<div class="tab" data-id="${c.id}" style="
      display: flex; align-items: center; gap: 8px; padding: 14px 18px; cursor: pointer;
      font-size: 14px; font-weight: ${on ? '700' : '400'};
      color: ${on ? '#15202e' : '#56657a'};
      border-bottom: 2px solid ${on ? '#0c5969' : 'transparent'};
      white-space: nowrap; flex: none;">
      <span style="font-family: 'Spline Sans Mono', monospace; font-size: 11px; font-weight: 500; color: ${on ? '#375798' : '#93a3b5'};">${c.code}</span>
      ${c.shortTitle}
    </div>`;
  }).join('');
  bar.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => { activeId = el.dataset.id; render(); });
  });
}

function renderContent() {
  const heading = document.getElementById('class-heading');
  const label = document.getElementById('tools-label');
  const grid = document.getElementById('tools-grid');

  if (activeId === null) {
    heading.style.display = 'none';
    label.textContent = 'All tools';
    grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
    grid.innerHTML = ALL_TOOLS.map(toolCardHTML).join('');
    return;
  }

  heading.style.display = '';
  label.textContent = 'Tools';
  const c = CLASSES.find(x => x.id === activeId);
  document.getElementById('class-meta').textContent = c.meta;
  document.getElementById('class-title').textContent = c.title;
  document.getElementById('class-blurb').textContent = c.blurb;

  if (c.tools.length === 0) {
    grid.style.gridTemplateColumns = '1fr';
    grid.innerHTML = `<p style="font-size: 14px; color: #93a3b5; margin: 0;">No tools in this category yet.</p>`;
  } else {
    grid.style.gridTemplateColumns = `repeat(${Math.min(c.tools.length, 3)}, 1fr)`;
    grid.innerHTML = c.tools.map(toolCardHTML).join('');
  }
}

function render() {
  renderTabs();
  renderContent();
}

document.getElementById('header-title').addEventListener('click', () => {
  activeId = null;
  render();
});

render();
</script>
</body>
</html>
